<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Ford vs Finn: Battle Arena</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body {
      width: 100vw; height: 100vh; overflow: hidden;
      display: flex; flex-direction: column;
      background: #111; font-family: 'Arial Black', Arial, sans-serif;
      user-select: none;
    }

    /* ── HUD ── */
    #hud { display: flex; align-items: center; height: 72px; background: #000; padding: 10px 12px; gap: 10px; flex-shrink: 0; }
    .hp-bar-wrapper { flex: 1; }
    .hp-label { font-size: 12px; font-weight: 900; margin-bottom: 4px; text-align: center; letter-spacing: 1px; }
    #ford-hp-label { color: #ff6b6b; }
    #finn-hp-label { color: #64b5f6; }
    .hp-track { width: 100%; height: 24px; background: #333; border-radius: 12px; overflow: hidden; }
    .hp-fill  { height: 100%; border-radius: 12px; transition: width 0.1s ease; }
    #ford-hp-fill { background: linear-gradient(90deg,#c0392b,#ff6b6b); width: 100%; }
    #finn-hp-fill { background: linear-gradient(90deg,#1565c0,#64b5f6); width: 100%; }
    #round-panel { flex-shrink: 0; display: flex; flex-direction: column; align-items: center; gap: 2px; min-width: 90px; }
    #round-label { font-size: 10px; font-weight: 900; color: #888; letter-spacing: 2px; }
    #round-score { font-size: 26px; font-weight: 900; color: #fff; letter-spacing: 4px; line-height: 1; }
    #round-pips  { display: flex; gap: 4px; align-items: center; }
    .pip { width: 10px; height: 10px; border-radius: 50%; border: 2px solid #555; }
    .pip.ford-won { background: #ff6b6b; border-color: #ff6b6b; }
    .pip.finn-won { background: #64b5f6; border-color: #64b5f6; }
    .pip-divider  { width: 2px; height: 12px; background: #444; border-radius: 1px; }

    /* ── WEAPON / STAT SELECT SCREEN ── */
    #weapon-screen { position: fixed; inset: 0; z-index: 200; display: none; background: #0a0a0a; }
    #weapon-screen.show { display: flex; }
    .weapon-side {
      flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 12px 8px; gap: 8px; overflow: hidden;
    }
    #ford-weapon-side { background: linear-gradient(170deg,#1a0505,#2d0a0a); border-right: 3px solid #333; }
    #finn-weapon-side { background: linear-gradient(170deg,#050518,#0a0a2d); }
    .picker-name  { font-size: clamp(22px,5.5vw,40px); font-weight: 900; letter-spacing: 3px; text-shadow: 0 0 20px currentColor; line-height: 1; }
    .picker-title { font-size: clamp(9px,2vw,13px); color: #888; font-weight: 700; letter-spacing: 2px; min-height: 16px; }
    #ford-weapon-side .picker-name { color: #ff6b6b; }
    #finn-weapon-side .picker-name { color: #64b5f6; }

    /* Stat allocation */
    .alloc-block { width: 96%; display: flex; flex-direction: column; gap: 6px; }
    .alloc-points { font-size: clamp(10px,2.2vw,13px); font-weight: 900; color: #ffd700; text-align: center; letter-spacing: 1px; margin-bottom: 2px; }
    .alloc-row { display: flex; align-items: center; gap: 4px; }
    .alloc-label { font-size: clamp(9px,1.9vw,12px); color: #aaa; font-weight: 900; letter-spacing: 1px; width: 62px; flex-shrink: 0; }
    .adj-btn {
      width: 32px; height: 32px; border-radius: 8px; border: 2px solid #555;
      background: #222; color: #fff; font-size: 18px; font-weight: 900;
      cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center;
      transition: background 0.1s, opacity 0.1s;
    }
    .adj-btn:active { background: #444; }
    .adj-btn:disabled { opacity: 0.2; pointer-events: none; }
    #ford-weapon-side .adj-btn { border-color: #c0392b; }
    #finn-weapon-side .adj-btn { border-color: #1565c0; }
    .alloc-track { flex: 1; height: 10px; background: #222; border-radius: 5px; overflow: hidden; }
    .alloc-fill  { height: 100%; border-radius: 5px; transition: width 0.15s; }
    #ford-weapon-side .alloc-fill { background: linear-gradient(90deg,#c0392b,#ff6b6b); }
    #finn-weapon-side .alloc-fill { background: linear-gradient(90deg,#1565c0,#64b5f6); }
    .alloc-val { font-size: clamp(9px,2vw,12px); color: #ccc; font-weight: 900; width: 40px; text-align: right; flex-shrink: 0; }

    /* Weapon buttons */
    .weapon-btn {
      width: 94%; display: flex; flex-direction: column; align-items: center;
      background: rgba(255,255,255,0.05); border: 3px solid rgba(255,255,255,0.1);
      border-radius: 14px; padding: 8px 6px; cursor: pointer; gap: 1px;
      transition: background 0.12s, border-color 0.12s, transform 0.08s;
    }
    .weapon-btn:active { transform: scale(0.97); }
    .weapon-btn .w-icon { font-size: clamp(24px,6vw,40px); line-height: 1; }
    .weapon-btn .w-name { font-size: clamp(10px,2.6vw,15px); font-weight: 900; color: #fff; letter-spacing: 1px; }
    .weapon-btn .w-desc { font-size: clamp(8px,1.8vw,11px); color: #666; font-weight: 700; text-align: center; }
    #ford-weapon-side .weapon-btn.selected { background: rgba(255,107,107,0.18); border-color: #ff6b6b; box-shadow: 0 0 12px rgba(255,107,107,0.3); }
    #ford-weapon-side .weapon-btn.selected .w-name { color: #ff6b6b; }
    #finn-weapon-side .weapon-btn.selected { background: rgba(100,181,246,0.18); border-color: #64b5f6; box-shadow: 0 0 12px rgba(100,181,246,0.3); }
    #finn-weapon-side .weapon-btn.selected .w-name { color: #64b5f6; }
    .weapon-btn.locked { opacity: 0.35; pointer-events: none; }

    /* ── COUNTDOWN ── */
    #countdown-overlay { position: fixed; inset: 0; z-index: 150; display: none; align-items: center; justify-content: center; background: rgba(0,0,0,0.78); pointer-events: none; }
    #countdown-overlay.show { display: flex; }
    #countdown-number { font-size: clamp(110px,28vw,180px); font-weight: 900; color: #ffd700; text-shadow: 0 0 60px #ffd700, 0 6px 0 #7a5800; line-height: 1; }
    #countdown-number.fight { color: #ff4444; text-shadow: 0 0 60px #ff4444, 0 6px 0 #7a0000; }
    #countdown-number.pop { animation: count-pop 0.7s ease-out forwards; }
    @keyframes count-pop { 0%{transform:scale(2.2);opacity:0} 25%{opacity:1} 75%{transform:scale(1);opacity:1} 100%{transform:scale(0.85);opacity:0.8} }

    /* ── ARENA ── */
    #arena { flex: 1; display: flex; }
    .fighter-zone { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; overflow: hidden; cursor: pointer; }
    #ford-zone { background: linear-gradient(170deg,#1a0505,#2d0a0a); border-right: 3px solid #333; }
    #finn-zone { background: linear-gradient(170deg,#050518,#0a0a2d); }
    .fighter-zone:active { filter: brightness(1.3); }
    .fighter-name { font-size: clamp(36px,8vw,64px); font-weight: 900; letter-spacing: 3px; text-shadow: 0 0 24px currentColor; margin-bottom: 8px; pointer-events: none; }
    #ford-zone .fighter-name { color: #ff6b6b; }
    #finn-zone .fighter-name { color: #64b5f6; }
    .weapon-icon  { font-size: clamp(52px,12vw,84px); margin-bottom: 8px; pointer-events: none; filter: drop-shadow(0 0 14px rgba(255,255,255,0.35)); }
    .tap-hint     { font-size: clamp(11px,2.3vw,17px); font-weight: 900; color: rgba(255,255,255,0.28); letter-spacing: 3px; pointer-events: none; }
    .poison-label { font-size: clamp(13px,2.8vw,19px); font-weight: 900; color: #66bb6a; letter-spacing: 2px; pointer-events: none; margin-top: 6px; animation: poison-pulse 0.6s ease-in-out infinite alternate; }
    @keyframes poison-pulse { from{opacity:1} to{opacity:0.35} }

    /* ── POWER SPOT ── */
    .power-spot {
      position: absolute; width: 64px; height: 64px; border-radius: 50%;
      background: radial-gradient(circle, #fff8dc 0%, rgba(255,215,0,0.5) 50%, transparent 100%);
      border: 3px solid #ffd700; box-shadow: 0 0 18px #ffd700, 0 0 36px rgba(255,215,0,0.4);
      cursor: pointer; z-index: 10; animation: spot-pulse 0.45s ease-in-out infinite alternate;
    }
    @keyframes spot-pulse { from{transform:scale(1);box-shadow:0 0 18px #ffd700,0 0 36px rgba(255,215,0,.4)} to{transform:scale(1.22);box-shadow:0 0 30px #ffd700,0 0 60px rgba(255,215,0,.7)} }
    .power-spot.spot-hit  { animation: spot-hit-anim  .35s ease-out forwards; pointer-events: none; }
    .power-spot.spot-miss { animation: spot-miss-anim .35s ease-out forwards; pointer-events: none; }
    @keyframes spot-hit-anim  { 0%{opacity:1;transform:scale(1.2)} 100%{opacity:0;transform:scale(3)} }
    @keyframes spot-miss-anim { 0%{opacity:1;transform:scale(1)}   100%{opacity:0;transform:scale(0.2)} }

    /* ── CHARGE BAR ── */
    .charge-track { position: absolute; bottom: 18px; left: 8%; right: 8%; height: 10px; background: rgba(255,255,255,0.07); border-radius: 5px; overflow: hidden; pointer-events: none; }
    .charge-fill  { height: 100%; width: 0%; border-radius: 5px; }
    #ford-zone .charge-fill { background: linear-gradient(90deg,#ff6b6b,#ffd700); box-shadow: 0 0 8px #ffd700; }
    #finn-zone .charge-fill { background: linear-gradient(90deg,#64b5f6,#ffd700); box-shadow: 0 0 8px #ffd700; }
    .charge-label { position: absolute; bottom: 34px; left: 50%; transform: translateX(-50%); font-size: clamp(12px,2.8vw,17px); font-weight: 900; color: #ffd700; letter-spacing: 2px; pointer-events: none; opacity: 0; text-shadow: 0 0 10px #ffd700; }
    .charge-label.show { opacity: 1; animation: clabel-pulse 0.3s ease infinite alternate; }
    @keyframes clabel-pulse { from{transform:translateX(-50%) scale(1)} to{transform:translateX(-50%) scale(1.1)} }

    /* ── HIT EFFECTS ── */
    .hit-flash { position: absolute; inset: 0; pointer-events: none; opacity: 0; }
    #ford-zone .hit-flash { background: radial-gradient(circle,rgba(255,100,100,.6),transparent 70%); }
    #finn-zone .hit-flash { background: radial-gradient(circle,rgba(100,181,246,.6),transparent 70%); }
    .hit-flash.flash     { animation: flash-anim .18s ease-out forwards; }
    .hit-flash.flash-big { animation: flash-anim .38s ease-out forwards; }
    @keyframes flash-anim { 0%{opacity:1} 100%{opacity:0} }

    .damage-pop { position: absolute; font-weight: 900; text-shadow: 0 2px 8px #000; pointer-events: none; top: 28%; animation: dmg-float .75s ease-out forwards; }
    .damage-pop.normal  { font-size: clamp(34px,8vw,52px);  color: #fff; }
    .damage-pop.special { font-size: clamp(48px,11vw,72px); color: #ffd700; text-shadow: 0 0 20px #ffd700,0 2px 8px #000; }
    .damage-pop.poison  { font-size: clamp(26px,6vw,40px);  color: #66bb6a; }
    .damage-pop.crit    { font-size: clamp(54px,12vw,80px); color: #ff4444; text-shadow: 0 0 24px #ff0000,0 2px 8px #000; }
    .damage-pop.magic   { font-size: clamp(34px,8vw,52px);  color: #ce93d8; text-shadow: 0 0 16px #ab47bc,0 2px 8px #000; }

    /* ── VERSION WATERMARK ── */
    #version-tag { position: fixed; bottom: 5px; right: 8px; z-index: 50; font-size: 11px; color: rgba(255,255,255,0.18); font-weight: 700; letter-spacing: 1px; pointer-events: none; font-family: monospace; }
    @keyframes dmg-float { 0%{opacity:1;transform:translateX(-50%) translateY(0) scale(1.5)} 100%{opacity:0;transform:translateX(-50%) translateY(-110px) scale(0.8)} }

    .crit-label { position: absolute; font-size: clamp(20px,5vw,30px); font-weight: 900; color: #ff4444; text-shadow: 0 0 16px #ff0000; letter-spacing: 2px; pointer-events: none; top: 18%; left: 50%; transform: translateX(-50%); animation: crit-pop .6s ease-out forwards; }
    @keyframes crit-pop { 0%{opacity:1;transform:translateX(-50%) scale(1.6)} 60%{opacity:1;transform:translateX(-50%) scale(1)} 100%{opacity:0;transform:translateX(-50%) scale(0.9)} }

    @keyframes shake     { 0%,100%{transform:translate(0)} 20%{transform:translate(-7px,4px)}  40%{transform:translate(7px,-4px)}  60%{transform:translate(-5px,5px)}  80%{transform:translate(5px,-3px)} }
    @keyframes shake-big { 0%,100%{transform:translate(0)} 15%{transform:translate(-14px,7px)} 30%{transform:translate(14px,-7px)} 45%{transform:translate(-10px,10px)} 60%{transform:translate(10px,-8px)} 75%{transform:translate(-7px,5px)} }
    .shake     { animation: shake     .22s ease-out; }
    .shake-big { animation: shake-big .4s  ease-out; }

    /* ── WIN SCREEN ── */
    #win-screen { position: fixed; inset: 0; display: none; flex-direction: column; align-items: center; justify-content: center; background: rgba(0,0,0,0.9); z-index: 100; }
    #win-screen.show { display: flex; }
    #win-text { font-size: clamp(42px,11vw,74px); font-weight: 900; color: #ffd700; text-shadow: 0 0 40px #ffd700,0 4px 0 #7a5800; margin-bottom: 10px; text-align: center; padding: 0 20px; animation: win-pulse .7s ease-in-out infinite alternate; }
    @keyframes win-pulse { from{transform:scale(1)} to{transform:scale(1.06)} }
    #win-sub  { font-size: clamp(15px,4vw,25px); color: #fff; opacity:.8; margin-bottom: 20px; text-align: center; padding: 0 20px; }
    #win-pips { display: flex; gap: 10px; align-items: center; margin-bottom: 44px; }
    .win-pip  { width: 20px; height: 20px; border-radius: 50%; border: 3px solid #555; }
    .win-pip.ford-won { background: #ff6b6b; border-color: #ff6b6b; }
    .win-pip.finn-won { background: #64b5f6; border-color: #64b5f6; }
    .win-pip-divider  { width: 3px; height: 22px; background: #555; border-radius: 2px; }
    #win-btn { font-size: clamp(19px,5vw,28px); font-weight: 900; color: #000; background: #ffd700; border: none; border-radius: 20px; padding: 18px 48px; cursor: pointer; letter-spacing: 2px; box-shadow: 0 7px 0 #9a7200; transition: transform .08s,box-shadow .08s; }
    #win-btn:active { transform: translateY(5px); box-shadow: 0 2px 0 #9a7200; }
  </style>
</head>
<body>

  <!-- HUD -->
  <div id="hud">
    <div class="hp-bar-wrapper">
      <div class="hp-label" id="ford-hp-label">FORD  ❤️  150</div>
      <div class="hp-track"><div class="hp-fill" id="ford-hp-fill"></div></div>
    </div>
    <div id="round-panel">
      <div id="round-label">ROUND 1</div>
      <div id="round-score">0 – 0</div>
      <div id="round-pips"></div>
    </div>
    <div class="hp-bar-wrapper">
      <div class="hp-label" id="finn-hp-label">FINN  ❤️  150</div>
      <div class="hp-track"><div class="hp-fill" id="finn-hp-fill"></div></div>
    </div>
  </div>

  <!-- Arena -->
  <div id="arena">
    <div class="fighter-zone" id="ford-zone">
      <div class="hit-flash"    id="ford-flash"></div>
      <div class="fighter-name">FORD</div>
      <div class="weapon-icon"  id="ford-weapon-icon">⚔️</div>
      <div class="tap-hint"     id="ford-tap-hint">TAP TO ATTACK</div>
      <div class="poison-label" id="ford-poison-label" style="display:none">☠️ POISONED</div>
      <div class="charge-label" id="ford-charge-label">⚡ HOLD!</div>
      <div class="charge-track"><div class="charge-fill" id="ford-charge-fill"></div></div>
    </div>
    <div class="fighter-zone" id="finn-zone">
      <div class="hit-flash"    id="finn-flash"></div>
      <div class="fighter-name">FINN</div>
      <div class="weapon-icon"  id="finn-weapon-icon">🛡️</div>
      <div class="tap-hint"     id="finn-tap-hint">TAP TO ATTACK</div>
      <div class="poison-label" id="finn-poison-label" style="display:none">☠️ POISONED</div>
      <div class="charge-label" id="finn-charge-label">⚡ HOLD!</div>
      <div class="charge-track"><div class="charge-fill" id="finn-charge-fill"></div></div>
    </div>
  </div>

  <!-- Countdown -->
  <div id="countdown-overlay">
    <div id="countdown-number">3</div>
  </div>

  <!-- Weapon + stat select screen -->
  <div id="weapon-screen" class="show">

    <div class="weapon-side" id="ford-weapon-side">
      <div class="picker-name">FORD</div>
      <div class="picker-title" id="ford-build-title">THE WARRIOR</div>

      <div class="alloc-block">
        <div class="alloc-points" id="ford-points-label">POINTS LEFT: 2</div>
        <div class="alloc-row">
          <div class="alloc-label">⚡ CRIT%</div>
          <button class="adj-btn" id="ford-crit-minus" onclick="adjustStat('ford','crit',-1)">−</button>
          <div class="alloc-track"><div class="alloc-fill" id="ford-crit-bar"></div></div>
          <button class="adj-btn" id="ford-crit-plus"  onclick="adjustStat('ford','crit',+1)">+</button>
          <div class="alloc-val" id="ford-crit-val"></div>
        </div>
        <div class="alloc-row">
          <div class="alloc-label">💥 POWER</div>
          <button class="adj-btn" id="ford-power-minus" onclick="adjustStat('ford','power',-1)">−</button>
          <div class="alloc-track"><div class="alloc-fill" id="ford-power-bar"></div></div>
          <button class="adj-btn" id="ford-power-plus"  onclick="adjustStat('ford','power',+1)">+</button>
          <div class="alloc-val" id="ford-power-val"></div>
        </div>
        <div class="alloc-row">
          <div class="alloc-label">🔋 CHARGE</div>
          <button class="adj-btn" id="ford-charge-minus" onclick="adjustStat('ford','charge',-1)">−</button>
          <div class="alloc-track"><div class="alloc-fill" id="ford-charge-bar"></div></div>
          <button class="adj-btn" id="ford-charge-plus"  onclick="adjustStat('ford','charge',+1)">+</button>
          <div class="alloc-val" id="ford-charge-val"></div>
        </div>
      </div>

      <button class="weapon-btn" id="ford-btn-sword" onclick="pickWeapon('ford','sword')">
        <span class="w-icon">⚔️</span><span class="w-name">SWORD</span><span class="w-desc">2–5 dmg · steady crits</span>
      </button>
      <button class="weapon-btn" id="ford-btn-arrow" onclick="pickWeapon('ford','arrow')">
        <span class="w-icon">🏹</span><span class="w-name">POISON ARROW</span><span class="w-desc">1–3 dmg · venom drains enemy</span>
      </button>
      <button class="weapon-btn" id="ford-btn-axe" onclick="pickWeapon('ford','axe')">
        <span class="w-icon">🪓</span><span class="w-name">AXE</span><span class="w-desc">2–8 dmg · brutal crits</span>
      </button>
      <button class="weapon-btn" id="ford-btn-wand" onclick="pickWeapon('ford','wand')">
        <span class="w-icon">🪄</span><span class="w-name">MAGIC WAND</span><span class="w-desc">1–10 dmg · wild · 3-bolt special</span>
      </button>
    </div>

    <div class="weapon-side" id="finn-weapon-side">
      <div class="picker-name">FINN</div>
      <div class="picker-title" id="finn-build-title">THE WARRIOR</div>

      <div class="alloc-block">
        <div class="alloc-points" id="finn-points-label">POINTS LEFT: 2</div>
        <div class="alloc-row">
          <div class="alloc-label">⚡ CRIT%</div>
          <button class="adj-btn" id="finn-crit-minus" onclick="adjustStat('finn','crit',-1)">−</button>
          <div class="alloc-track"><div class="alloc-fill" id="finn-crit-bar"></div></div>
          <button class="adj-btn" id="finn-crit-plus"  onclick="adjustStat('finn','crit',+1)">+</button>
          <div class="alloc-val" id="finn-crit-val"></div>
        </div>
        <div class="alloc-row">
          <div class="alloc-label">💥 POWER</div>
          <button class="adj-btn" id="finn-power-minus" onclick="adjustStat('finn','power',-1)">−</button>
          <div class="alloc-track"><div class="alloc-fill" id="finn-power-bar"></div></div>
          <button class="adj-btn" id="finn-power-plus"  onclick="adjustStat('finn','power',+1)">+</button>
          <div class="alloc-val" id="finn-power-val"></div>
        </div>
        <div class="alloc-row">
          <div class="alloc-label">🔋 CHARGE</div>
          <button class="adj-btn" id="finn-charge-minus" onclick="adjustStat('finn','charge',-1)">−</button>
          <div class="alloc-track"><div class="alloc-fill" id="finn-charge-bar"></div></div>
          <button class="adj-btn" id="finn-charge-plus"  onclick="adjustStat('finn','charge',+1)">+</button>
          <div class="alloc-val" id="finn-charge-val"></div>
        </div>
      </div>

      <button class="weapon-btn" id="finn-btn-sword" onclick="pickWeapon('finn','sword')">
        <span class="w-icon">⚔️</span><span class="w-name">SWORD</span><span class="w-desc">2–5 dmg · steady crits</span>
      </button>
      <button class="weapon-btn" id="finn-btn-arrow" onclick="pickWeapon('finn','arrow')">
        <span class="w-icon">🏹</span><span class="w-name">POISON ARROW</span><span class="w-desc">1–3 dmg · venom drains enemy</span>
      </button>
      <button class="weapon-btn" id="finn-btn-axe" onclick="pickWeapon('finn','axe')">
        <span class="w-icon">🪓</span><span class="w-name">AXE</span><span class="w-desc">2–8 dmg · brutal crits</span>
      </button>
      <button class="weapon-btn" id="finn-btn-wand" onclick="pickWeapon('finn','wand')">
        <span class="w-icon">🪄</span><span class="w-name">MAGIC WAND</span><span class="w-desc">1–10 dmg · wild · 3-bolt special</span>
      </button>
    </div>
  </div>

  <div id="version-tag">v1.7</div>

  <!-- Win screen -->
  <div id="win-screen">
    <div id="win-text">FORD WINS!</div>
    <div id="win-sub">Round 1 goes to Ford!</div>
    <div id="win-pips"></div>
    <button id="win-btn">NEXT ROUND ▶</button>
  </div>

  <script>
    // ── Stat tables (index = allocation level 0–4) ──
    const STAT_TABLE = {
      crit:   { values: [0.04, 0.10, 0.16, 0.22, 0.30], labels: ['4%','10%','16%','22%','30%'] },
      power:  { values: [1.2,  1.5,  1.8,  2.2,  2.7],  labels: ['×1.2','×1.5','×1.8','×2.2','×2.7'] },
      charge: { values: [1800, 1450, 1150, 900,  650],   labels: ['SLOW','MED','MED','FAST','FAST'] },
    };
    const MAX_LEVEL   = 4;   // max per stat
    const TOTAL_PTS   = 5;   // total points per player
    const DEFAULT_ALLOC = { crit:1, power:1, charge:1 }; // uses 3, leaves 2 free

    const BUILD_TITLES = [
      { stat:'crit',   min:3, title:'THE LUCKY ONE' },
      { stat:'power',  min:3, title:'THE CRUSHER'   },
      { stat:'charge', min:3, title:'THE SPEEDSTER' },
    ];
    function getBuildTitle(alloc) {
      for (const b of BUILD_TITLES) if (alloc[b.stat] >= b.min) return b.title;
      const max = Math.max(alloc.crit, alloc.power, alloc.charge);
      if (alloc.crit === max)   return 'THE LUCKY ONE';
      if (alloc.power === max)  return 'THE CRUSHER';
      if (alloc.charge === max) return 'THE SPEEDSTER';
      return 'THE WARRIOR';
    }

    const WEAPONS = {
      sword: { icon:'⚔️', dmgMin:2, dmgMax:5,  specMin:10, specMax:16, critBonus:0.05,  critMultBonus:0,   poison:false, bolts:1 },
      arrow: { icon:'🏹', dmgMin:1, dmgMax:3,  specMin:2,  specMax:4,  critBonus:-0.05, critMultBonus:0,   poison:true, poisonTicks:3, poisonDmg:2, specPoisonTicks:7, specPoisonDmg:3, bolts:1 },
      axe:   { icon:'🪓', dmgMin:2, dmgMax:8,  specMin:14, specMax:24, critBonus:-0.08, critMultBonus:1.0, poison:false, bolts:1 },
      wand:  { icon:'🪄', dmgMin:1, dmgMax:10, specMin:4,  specMax:10, critBonus:0,     critMultBonus:0.3, poison:false, bolts:3 },
    };
    const MAX_HP       = 150;
    const ROUNDS_TO_WIN = 3;
    const SPOT_MIN_MS  = 4500;
    const SPOT_MAX_MS  = 9000;
    const SPOT_LIFE_MS = 2400;

    // ── Audio ──
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playHit(big, crit) {
      const osc=audioCtx.createOscillator(),gain=audioCtx.createGain(),dist=audioCtx.createWaveShaper();
      const curve=new Float32Array(256);
      for(let i=0;i<256;i++){const x=(i*2)/256-1;curve[i]=(Math.PI+200)*x/(Math.PI+200*Math.abs(x));}
      dist.curve=curve; osc.connect(dist); dist.connect(gain); gain.connect(audioCtx.destination);
      osc.type=crit?'square':'sawtooth';
      const base=crit?260:big?100:160, dur=crit?.5:big?.45:.28;
      osc.frequency.setValueAtTime(base+Math.random()*80,audioCtx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(crit?130:40,audioCtx.currentTime+dur);
      gain.gain.setValueAtTime(crit?.7:big?.8:.55,audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+dur);
      osc.start(); osc.stop(audioCtx.currentTime+dur);
    }
    function playPoison(){const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.connect(g);g.connect(audioCtx.destination);o.type='sine';o.frequency.setValueAtTime(220,audioCtx.currentTime);o.frequency.linearRampToValueAtTime(110,audioCtx.currentTime+.3);g.gain.setValueAtTime(.12,audioCtx.currentTime);g.gain.exponentialRampToValueAtTime(.001,audioCtx.currentTime+.3);o.start();o.stop(audioCtx.currentTime+.3);}
    function playSpotAppear(){[880,1108,1318].forEach((f,i)=>{const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.connect(g);g.connect(audioCtx.destination);const t=audioCtx.currentTime+i*.07;o.type='sine';o.frequency.setValueAtTime(f,t);g.gain.setValueAtTime(.12,t);g.gain.exponentialRampToValueAtTime(.001,t+.22);o.start(t);o.stop(t+.22);});}
    function playSpotHit(){[1047,1319,1568,2093].forEach((f,i)=>{const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.connect(g);g.connect(audioCtx.destination);const t=audioCtx.currentTime+i*.06;o.type='sine';o.frequency.setValueAtTime(f,t);g.gain.setValueAtTime(.18,t);g.gain.exponentialRampToValueAtTime(.001,t+.28);o.start(t);o.stop(t+.28);});}
    function playCountBeep(isFight){const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.connect(g);g.connect(audioCtx.destination);o.type='square';o.frequency.setValueAtTime(isFight?880:440,audioCtx.currentTime);g.gain.setValueAtTime(.2,audioCtx.currentTime);g.gain.exponentialRampToValueAtTime(.001,audioCtx.currentTime+(isFight?.5:.15));o.start();o.stop(audioCtx.currentTime+(isFight?.5:.15));}
    function playRoundWin(){[392,523,659].forEach((f,i)=>{const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.connect(g);g.connect(audioCtx.destination);const t=audioCtx.currentTime+i*.14;o.type='square';o.frequency.setValueAtTime(f,t);g.gain.setValueAtTime(.25,t);g.gain.exponentialRampToValueAtTime(.001,t+.4);o.start(t);o.stop(t+.4);});}
    function playMatchWin(){[523,659,784,784,1047].forEach((f,i)=>{const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.connect(g);g.connect(audioCtx.destination);const t=audioCtx.currentTime+i*.13;o.type='square';o.frequency.setValueAtTime(f,t);g.gain.setValueAtTime(.3,t);g.gain.exponentialRampToValueAtTime(.001,t+.5);o.start(t);o.stop(t+.5);});}

    // ── State ──
    let hp       = { ford: MAX_HP, finn: MAX_HP };
    let wins     = { ford: 0,      finn: 0      };
    let round    = 1;
    let gameOver = false;
    let roundActive = false;   // blocks input during countdown
    let weapon   = { ford: null, finn: null };
    let allocation = {
      ford: { ...DEFAULT_ALLOC },
      finn: { ...DEFAULT_ALLOC },
    };
    let pointsLeft = {
      ford: TOTAL_PTS - (DEFAULT_ALLOC.crit + DEFAULT_ALLOC.power + DEFAULT_ALLOC.charge),
      finn: TOTAL_PTS - (DEFAULT_ALLOC.crit + DEFAULT_ALLOC.power + DEFAULT_ALLOC.charge),
    };
    let poisonInterval = { ford:null, finn:null };
    let chargeStart    = { ford:null, finn:null };
    let chargeTimer    = { ford:null, finn:null };
    let chargeFrame    = { ford:null, finn:null };
    let chargeFired    = { ford:false,finn:false };
    let spotTimeout    = { ford:null, finn:null };
    let activeSpot     = { ford:null, finn:null };

    const $ = id => document.getElementById(id);
    const fordZone = $('ford-zone'), finnZone = $('finn-zone'), arena = $('arena');

    // ── Derived character stats ──
    function getStats(who) {
      const a = allocation[who];
      return {
        critChance: STAT_TABLE.crit.values[a.crit],
        critMult:   STAT_TABLE.power.values[a.power],
        chargeMs:   STAT_TABLE.charge.values[a.charge],
      };
    }

    // ── Stat allocation UI ──
    function renderAllocUI(who) {
      const a    = allocation[who];
      const left = pointsLeft[who];
      $(`${who}-points-label`).textContent = 'POINTS LEFT: ' + left;
      ['crit','power','charge'].forEach(stat => {
        const level  = a[stat];
        const maxPct = Math.round((level / MAX_LEVEL) * 100);
        $(`${who}-${stat}-bar`).style.width = maxPct + '%';
        $(`${who}-${stat}-val`).textContent = STAT_TABLE[stat].labels[level];
        $(`${who}-${stat}-minus`).disabled = (level === 0);
        $(`${who}-${stat}-plus`).disabled  = (level >= MAX_LEVEL || left <= 0);
      });
      $(`${who}-build-title`).textContent = getBuildTitle(a);
    }

    function adjustStat(who, stat, delta) {
      if (audioCtx.state === 'suspended') audioCtx.resume();
      const newLevel = allocation[who][stat] + delta;
      if (newLevel < 0 || newLevel > MAX_LEVEL) return;
      if (delta > 0 && pointsLeft[who] <= 0) return;
      allocation[who][stat] = newLevel;
      pointsLeft[who] -= delta;
      renderAllocUI(who);
    }

    // ── Weapon pick ──
    function pickWeapon(who, w) {
      if (audioCtx.state === 'suspended') audioCtx.resume();
      weapon[who] = w;
      ['sword','arrow','axe','wand'].forEach(k => {
        $(`${who}-btn-${k}`).classList.toggle('selected', k === w);
        $(`${who}-btn-${k}`).classList.toggle('locked',   k !== w);
      });
      if (weapon.ford && weapon.finn) setTimeout(beginCountdown, 300);
    }

    function showWeaponScreen() {
      weapon = { ford: null, finn: null };
      ['ford','finn'].forEach(who => {
        ['sword','arrow','axe','wand'].forEach(k => $(`${who}-btn-${k}`).classList.remove('selected','locked'));
        renderAllocUI(who);
      });
      $('weapon-screen').classList.add('show');
    }

    // ── Countdown ──
    function beginCountdown() {
      $('weapon-screen').classList.remove('show');
      $('ford-weapon-icon').textContent = WEAPONS[weapon.ford].icon;
      $('finn-weapon-icon').textContent = WEAPONS[weapon.finn].icon;
      $('ford-tap-hint').textContent = 'TAP  ·  HOLD FOR ⚡';
      $('finn-tap-hint').textContent = 'TAP  ·  HOLD FOR ⚡';
      roundActive = false;  // block input during countdown

      const overlay = $('countdown-overlay');
      const numEl   = $('countdown-number');
      overlay.classList.add('show');
      let count = 3;
      function showCount(n) {
        numEl.classList.toggle('fight', n === 0);
        numEl.textContent = n === 0 ? 'FIGHT!' : String(n);
        numEl.classList.remove('pop'); void numEl.offsetWidth; numEl.classList.add('pop');
        playCountBeep(n === 0);
      }
      showCount(3);
      const iv = setInterval(() => {
        count--;
        if (count >= 0) {
          showCount(count);
          if (count === 0) setTimeout(() => {
            clearInterval(iv);
            overlay.classList.remove('show');
            startFight();
          }, 650);
        }
      }, 900);
    }

    function startFight() {
      roundActive = true;
      scheduleSpot('ford');
      scheduleSpot('finn');
    }

    // ── Power spots ──
    function scheduleSpot(who) {
      clearTimeout(spotTimeout[who]);
      const delay = SPOT_MIN_MS + Math.random() * (SPOT_MAX_MS - SPOT_MIN_MS);
      spotTimeout[who] = setTimeout(() => spawnSpot(who), delay);
    }
    function spawnSpot(who) {
      if (gameOver || !roundActive) return;
      const zone = who === 'ford' ? fordZone : finnZone;
      const el   = document.createElement('div');
      el.className = 'power-spot';
      const sz=64, zW=zone.offsetWidth, zH=zone.offsetHeight;
      const xMin = who==='ford' ? zW*.10 : zW*.30;
      const xMax = who==='ford' ? zW*.68 : zW*.88;
      el.style.left = (xMin + Math.random()*(xMax-xMin) - sz/2) + 'px';
      el.style.top  = (zH*.12 + Math.random()*(zH*.66) - sz/2) + 'px';
      zone.appendChild(el);
      activeSpot[who] = el;
      playSpotAppear();
      function onTap(e) {
        e.preventDefault(); e.stopPropagation();
        if (gameOver || !roundActive) return;
        clearTimeout(spotTimeout[who]);
        removeSpot(who, true);
        playSpotHit();
        doHit(who, true);
        scheduleSpot(who);
      }
      el.addEventListener('touchstart', onTap, { passive:false });
      el.addEventListener('mousedown',  onTap);
      spotTimeout[who] = setTimeout(() => { removeSpot(who, false); scheduleSpot(who); }, SPOT_LIFE_MS);
    }
    function removeSpot(who, tapped) {
      const el = activeSpot[who]; if (!el) return;
      activeSpot[who] = null;
      el.classList.add(tapped ? 'spot-hit' : 'spot-miss');
      el.addEventListener('animationend', () => el.remove(), { once:true });
    }
    function stopSpots() {
      clearTimeout(spotTimeout.ford); clearTimeout(spotTimeout.finn);
      removeSpot('ford', false); removeSpot('finn', false);
    }

    // ── HUD ──
    function updateHp(who) {
      const pct = Math.max(0, hp[who]) / MAX_HP * 100;
      $(`${who}-hp-fill`).style.width = pct + '%';
      $(`${who}-hp-label`).textContent = (who==='ford'?'FORD  ❤️  ':'FINN  ❤️  ') + Math.max(0, hp[who]);
    }
    function buildPips(container, large) {
      container.innerHTML = '';
      const cls=large?'win-pip':'pip', div=large?'win-pip-divider':'pip-divider';
      for(let i=0;i<ROUNDS_TO_WIN;i++){const p=document.createElement('div');p.className=cls+(i<wins.ford?' ford-won':'');container.appendChild(p);}
      const d=document.createElement('div');d.className=div;container.appendChild(d);
      for(let i=0;i<ROUNDS_TO_WIN;i++){const p=document.createElement('div');p.className=cls+(i<wins.finn?' finn-won':'');container.appendChild(p);}
    }
    function updateRoundHUD() {
      $('round-label').textContent = 'ROUND ' + round;
      $('round-score').textContent = wins.ford + ' – ' + wins.finn;
      buildPips($('round-pips'), false);
    }

    // ── Hit effects ──
    function spawnDmg(zone, dmg, type) {
      const el=document.createElement('div'); el.className='damage-pop '+type; el.textContent='-'+dmg;
      el.style.left=(22+Math.random()*56)+'%'; zone.appendChild(el);
      el.addEventListener('animationend', ()=>el.remove());
    }
    function spawnCritLabel(zone) {
      const el=document.createElement('div'); el.className='crit-label'; el.textContent='💥 CRITICAL!';
      zone.appendChild(el); el.addEventListener('animationend', ()=>el.remove());
    }
    function flashZone(flashEl, big) {
      flashEl.classList.remove('flash','flash-big'); void flashEl.offsetWidth;
      flashEl.classList.add(big?'flash-big':'flash');
    }
    function shakeScreen(big) {
      arena.classList.remove('shake','shake-big'); void arena.offsetWidth;
      arena.classList.add(big?'shake-big':'shake');
      arena.addEventListener('animationend', ()=>arena.classList.remove('shake','shake-big'), {once:true});
    }

    // ── Crit ──
    function rollCrit(attacker) {
      const s = getStats(attacker), w = WEAPONS[weapon[attacker]];
      const chance = Math.min(0.60, Math.max(0.02, s.critChance + w.critBonus));
      const isCrit = Math.random() < chance;
      return { isCrit, mult: isCrit ? s.critMult + w.critMultBonus : 1 };
    }

    // ── Poison ──
    function applyPoison(victim, ticks, dmgPerTick) {
      clearInterval(poisonInterval[victim]);
      const vZone = victim==='ford' ? fordZone : finnZone;
      const lbl   = $(`${victim}-poison-label`);
      lbl.style.display = '';
      let left = ticks;
      poisonInterval[victim] = setInterval(() => {
        if (gameOver) { clearInterval(poisonInterval[victim]); lbl.style.display='none'; return; }
        hp[victim] -= dmgPerTick;
        spawnDmg(vZone, dmgPerTick, 'poison'); playPoison(); updateHp(victim); left--;
        if (left<=0 || hp[victim]<=0) {
          clearInterval(poisonInterval[victim]); lbl.style.display='none';
          if (hp[victim]<=0) endRound(victim==='ford'?'finn':'ford');
        }
      }, 800);
    }

    // ── Charge bar ──
    function animateCharge(who) {
      const fill=$(`${who}-charge-fill`), label=$(`${who}-charge-label`);
      const dur = getStats(who).chargeMs;
      function frame() {
        if (!chargeStart[who]) return;
        const pct = Math.min(100, ((Date.now()-chargeStart[who])/dur)*100);
        fill.style.width = pct+'%';
        if (pct>=15) label.classList.add('show');
        if (pct<100) chargeFrame[who] = requestAnimationFrame(frame);
      }
      chargeFrame[who] = requestAnimationFrame(frame);
    }
    function resetCharge(who) {
      chargeStart[who]=null; cancelAnimationFrame(chargeFrame[who]);
      $(`${who}-charge-fill`).style.width='0%'; $(`${who}-charge-label`).classList.remove('show');
    }

    // ── Core hit ──
    function fireSingleHit(attacker, defender, w, isSpecial) {
      if (gameOver || !roundActive) return;
      const defZone = defender==='ford' ? fordZone : finnZone;
      const {isCrit, mult} = rollCrit(attacker);
      const base = isSpecial
        ? Math.floor(Math.random()*(w.specMax-w.specMin+1))+w.specMin
        : Math.floor(Math.random()*(w.dmgMax-w.dmgMin+1))+w.dmgMin;
      const dmg  = Math.round(base * mult);
      const isWand = weapon[attacker] === 'wand';
      const type = isCrit ? 'crit' : isWand ? 'magic' : isSpecial ? 'special' : 'normal';
      hp[defender] -= dmg;
      playHit(isSpecial, isCrit); shakeScreen(isSpecial||isCrit);
      flashZone($(`${defender}-flash`), isSpecial||isCrit);
      spawnDmg(defZone, dmg, type);
      if (isCrit) spawnCritLabel(defZone);
      updateHp(defender);
      if (w.poison) {
        const ticks = isSpecial ? w.specPoisonTicks : w.poisonTicks;
        const pdmg  = isSpecial ? w.specPoisonDmg   : w.poisonDmg;
        applyPoison(defender, ticks, pdmg);
      }
      if (hp[defender] <= 0) endRound(attacker);
    }

    function doHit(attacker, isSpecial) {
      if (gameOver || !roundActive) return;
      const defender = attacker==='ford' ? 'finn' : 'ford';
      const w     = WEAPONS[weapon[attacker]];
      const bolts = isSpecial ? w.bolts : 1;
      for (let i = 0; i < bolts; i++) {
        setTimeout(() => fireSingleHit(attacker, defender, w, isSpecial), i * 180);
      }
    }

    // ── Touch ──
    function onTouchStart(who) {
      return e => {
        e.preventDefault();
        if (!roundActive || gameOver || !weapon[who]) return;
        if (audioCtx.state==='suspended') audioCtx.resume();
        chargeStart[who]=Date.now(); chargeFired[who]=false;
        clearTimeout(chargeTimer[who]); animateCharge(who);
        chargeTimer[who] = setTimeout(() => {
          chargeFired[who]=true; resetCharge(who); doHit(who, true);
        }, getStats(who).chargeMs);
      };
    }
    function onTouchEnd(who) {
      return e => {
        e.preventDefault();
        if (!chargeStart[who]) return;
        if (chargeFired[who]) { resetCharge(who); return; }
        clearTimeout(chargeTimer[who]); resetCharge(who); chargeFired[who]=true; doHit(who, false);
      };
    }

    // ── Round / match ──
    function endRound(winner) {
      gameOver=true; roundActive=false; stopSpots();
      clearInterval(poisonInterval.ford); clearInterval(poisonInterval.finn);
      $('ford-poison-label').style.display='none'; $('finn-poison-label').style.display='none';
      wins[winner]++; updateRoundHUD(); buildPips($('win-pips'), true);
      const loser = winner==='ford' ? 'Finn' : 'Ford';
      if (wins[winner] >= ROUNDS_TO_WIN) {
        playMatchWin();
        $('win-text').textContent = winner.toUpperCase()+' WINS THE MATCH! 🏆';
        $('win-sub').textContent  = '💀 '+loser+' defeated '+wins[winner]+' – '+wins[loser.toLowerCase()]+'!';
        $('win-btn').textContent  = '⚔️  PLAY AGAIN  ⚔️'; $('win-btn').onclick = resetMatch;
      } else {
        playRoundWin();
        $('win-text').textContent = winner.toUpperCase()+' WINS ROUND '+round+'!';
        $('win-sub').textContent  = '💀 '+loser+' is down! Round '+(wins.ford+wins.finn+1)+' up next…';
        $('win-btn').textContent  = '▶  NEXT ROUND  ▶'; $('win-btn').onclick = nextRound;
      }
      $('win-screen').classList.add('show');
    }
    function nextRound() {
      round++; hp={ford:MAX_HP,finn:MAX_HP}; gameOver=false;
      updateHp('ford'); updateHp('finn'); updateRoundHUD();
      $('win-screen').classList.remove('show'); showWeaponScreen();
    }
    function resetMatch() {
      wins={ford:0,finn:0}; round=1; hp={ford:MAX_HP,finn:MAX_HP}; gameOver=false;
      updateHp('ford'); updateHp('finn'); updateRoundHUD();
      $('win-screen').classList.remove('show'); showWeaponScreen();
    }

    // ── Input ──
    fordZone.addEventListener('touchstart', onTouchStart('ford'), {passive:false});
    fordZone.addEventListener('touchend',   onTouchEnd('ford'),   {passive:false});
    finnZone.addEventListener('touchstart', onTouchStart('finn'), {passive:false});
    finnZone.addEventListener('touchend',   onTouchEnd('finn'),   {passive:false});
    fordZone.addEventListener('mousedown',  onTouchStart('ford'));
    fordZone.addEventListener('mouseup',    onTouchEnd('ford'));
    finnZone.addEventListener('mousedown',  onTouchStart('finn'));
    finnZone.addEventListener('mouseup',    onTouchEnd('finn'));
    $('win-btn').addEventListener('touchstart', e => { e.preventDefault(); $('win-btn').onclick?.(); });

    // ── Init ──
    renderAllocUI('ford'); renderAllocUI('finn'); updateRoundHUD();
  </script>
</body>
</html>
